<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cthulhu tentacle emblem">
  <defs>
    <linearGradient id="head" x1="32" y1="8" x2="32" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a1a4a"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <linearGradient id="tentacle" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f6b52"/>
      <stop offset="45%" stop-color="#2d8a62"/>
      <stop offset="100%" stop-color="#0f3d2e"/>
    </linearGradient>
    <linearGradient id="tentacle-dark" x1="64" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#164a38"/>
      <stop offset="100%" stop-color="#0a2419"/>
    </linearGradient>
    <radialGradient id="eye-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b8ffcc"/>
      <stop offset="35%" stop-color="#3ecf6a"/>
      <stop offset="100%" stop-color="#0d3d24"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wing silhouettes -->
  <path fill="#1a1030" opacity="0.9"
    d="M10 22 C4 18 2 28 8 34 C12 30 14 26 10 22 Z"/>
  <path fill="#1a1030" opacity="0.9"
    d="M54 22 C60 18 62 28 56 34 C52 30 50 26 54 22 Z"/>

  <!-- Central head -->
  <ellipse cx="32" cy="24" rx="11" ry="10" fill="url(#head)"/>

  <!-- Tentacles (back layer) -->
  <path fill="url(#tentacle-dark)" stroke="#082218" stroke-width="0.5"
    d="M22 30 C14 38 8 50 6 62 C10 58 12 48 18 40 C20 36 21 33 22 30 Z"/>
  <path fill="url(#tentacle-dark)" stroke="#082218" stroke-width="0.5"
    d="M42 30 C50 38 56 50 58 62 C54 58 52 48 46 40 C44 36 43 33 42 30 Z"/>

  <!-- Tentacles (mid layer) -->
  <path fill="url(#tentacle)" stroke="#0a2e22" stroke-width="0.5"
    d="M26 31 C20 42 16 54 14 63 C18 58 20 50 24 42 C26 38 26 34 26 31 Z"/>
  <path fill="url(#tentacle)" stroke="#0a2e22" stroke-width="0.5"
    d="M38 31 C44 42 48 54 50 63 C46 58 44 50 40 42 C38 38 38 34 38 31 Z"/>

  <!-- Front tentacles curling outward -->
  <path fill="url(#tentacle)" stroke="#0a2e22" stroke-width="0.5"
    d="M29 32 C24 44 22 56 20 63 C24 57 27 48 30 40 C31 37 30 34 29 32 Z"/>
  <path fill="url(#tentacle)" stroke="#0a2e22" stroke-width="0.5"
    d="M35 32 C40 44 42 56 44 63 C40 57 37 48 34 40 C33 37 34 34 35 32 Z"/>

  <!-- Center tentacle -->
  <path fill="url(#tentacle-dark)" stroke="#082218" stroke-width="0.5"
    d="M32 33 C31 46 30 56 29 63 C33 58 34 48 33 38 C33 36 32 34 32 33 Z"/>

  <!-- Suckers along tentacles -->
  <g fill="#0a2419" opacity="0.55">
    <ellipse cx="23" cy="46" rx="1.1" ry="0.7" transform="rotate(-25 23 46)"/>
    <ellipse cx="20" cy="54" rx="1" ry="0.65" transform="rotate(-35 20 54)"/>
    <ellipse cx="41" cy="46" rx="1.1" ry="0.7" transform="rotate(25 41 46)"/>
    <ellipse cx="44" cy="54" rx="1" ry="0.65" transform="rotate(35 44 54)"/>
    <ellipse cx="27" cy="50" rx="0.9" ry="0.6" transform="rotate(-15 27 50)"/>
    <ellipse cx="37" cy="50" rx="0.9" ry="0.6" transform="rotate(15 37 50)"/>
    <ellipse cx="32" cy="52" rx="0.8" ry="0.55"/>
  </g>

  <!-- Eyes -->
  <g filter="url(#glow)">
    <ellipse cx="27" cy="23" rx="3.2" ry="4" fill="url(#eye-glow)"/>
    <ellipse cx="37" cy="23" rx="3.2" ry="4" fill="url(#eye-glow)"/>
    <ellipse cx="27" cy="23" rx="0.7" ry="3.2" fill="#061408"/>
    <ellipse cx="37" cy="23" rx="0.7" ry="3.2" fill="#061408"/>
  </g>
</svg>
